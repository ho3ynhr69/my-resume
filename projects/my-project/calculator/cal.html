<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ماشین حساب حرفه‌ای</title>

  <link rel="stylesheet" href="cal-css/cal.css">

</head>
<body>

  <div class="calc" role="application" aria-label="ماشین حساب چهار عمل اصلی">
    <div class="calc-inner">
      <div class="display" aria-live="polite">
        <div class="top">
          <div class="hint">فقط +  −  ×  ÷</div>
          <div class="badge" id="statusBadge">آماده</div>
        </div>

        <div class="equation" id="equation"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keys">
        <button class="danger" data-action="clear">AC</button>
        <button class="small" data-action="backspace">⌫</button>
        <button class="small" data-action="sign">±</button>
        <button class="operator" data-op="/">÷</button>

        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button class="operator" data-op="*">×</button>

        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button class="operator" data-op="-">−</button>

        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button class="operator" data-op="+">+</button>

        <button class="equals" data-action="equals">=</button>
        <button data-digit="0">0</button>
        <button class="small" data-action="dot">.</button>
      </div>
    </div>
  </div>

  <script src="cal-js/cal.js"></script>
</body>
</html>
